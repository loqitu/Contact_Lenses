<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Lens Tracker" />
  <title>Lens Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #f2f2f7;
      color: #1c1c1e;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1c1c1e; color: #f2f2f7; }
      .eye-card { background: #2c2c2e; border-color: #3a3a3c; }
      .btn-new-lens { background: #3a3a3c; border-color: #545456; color: #f2f2f7; }
      .btn-both { background: #2c2c2e; }
      .btn-export { background: #2c2c2e; border-color: #3a3a3c; color: #f2f2f7; }
      .divider { border-color: #3a3a3c; }
      .log-header { background: #1c1c1e; }
      .log-entry { border-color: #3a3a3c; }
      .subtitle { color: #8e8e93; }
      .timer-sub { color: #8e8e93; }
      .log-title { color: #8e8e93; }
      .log-count { color: #8e8e93; }
      .log-eye { color: #8e8e93; }
      .log-time { color: #8e8e93; }
      .empty-log { color: #8e8e93; }
      .toast { background: #f2f2f7; color: #1c1c1e; }
      .eye-label { color: #f2f2f7; }
      .timer-display { color: #f2f2f7; }
    }

    .top {
      padding: 16px 16px 10px;
      padding-top: calc(16px + env(safe-area-inset-top));
      flex-shrink: 0;
    }

    h1 {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .subtitle {
      font-size: 12px;
      color: #6d6d72;
    }

    .cards {
      padding: 0 16px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 8px;
    }

    .eye-card {
      background: #ffffff;
      border: 0.5px solid #d1d1d6;
      border-radius: 14px;
      padding: 11px 13px;
    }

    .eye-header {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 5px;
    }

    .eye-label {
      font-size: 13px;
      font-weight: 700;
      color: #1c1c1e;
    }

    .eye-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d1d1d6;
      border: 2px solid #aeaeb2;
      flex-shrink: 0;
    }

    .eye-dot.active {
      background: #30d158;
      border-color: #30d158;
    }

    .timer-display {
      font-size: 26px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.5px;
      margin-bottom: 2px;
      color: #1c1c1e;
    }

    .timer-sub {
      font-size: 11px;
      color: #6d6d72;
      margin-bottom: 8px;
      min-height: 14px;
    }

    .btn-new-lens {
      width: 100%;
      padding: 7px 0;
      border-radius: 9px;
      border: 0.5px solid #d1d1d6;
      background: #e5e5ea;
      color: #1c1c1e;
      font-size: 13px;
      font-weight: 600;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-new-lens:active { opacity: 0.7; }

    .reset-both-wrap {
      padding: 0 28px;
      flex-shrink: 0;
    }

    .btn-both {
      width: 100%;
      padding: 9px;
      border-radius: 11px;
      border: 0.5px solid #007aff;
      background: #ffffff;
      color: #007aff;
      font-size: 13px;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-both:active { opacity: 0.7; }

    .divider {
      border: none;
      border-top: 0.5px solid #d1d1d6;
      margin: 9px 28px;
      flex-shrink: 0;
    }

    .log-section {
      flex: 1;
      overflow-y: auto;
      padding: 0 28px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      min-height: 0;
      -webkit-overflow-scrolling: touch;
    }

    .log-header {
      position: sticky;
      top: 0;
      background: #f2f2f7;
      padding: 5px 0 6px;
      z-index: 1;
    }

    .log-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .log-title {
      font-size: 11px;
      font-weight: 600;
      color: #6d6d72;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .log-count {
      font-size: 11px;
      color: #6d6d72;
    }

    .btn-export {
      width: 100%;
      padding: 8px;
      border-radius: 9px;
      border: 0.5px solid #d1d1d6;
      background: #ffffff;
      color: #1c1c1e;
      font-size: 13px;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-export:active { opacity: 0.7; }

    .log-entry {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 0.5px solid #d1d1d6;
      font-size: 12px;
    }

    .log-eye {
      color: #6d6d72;
      min-width: 14px;
      flex-shrink: 0;
    }

    .log-label {
      flex: 1;
      padding: 0 7px;
    }

    .log-time {
      color: #6d6d72;
      white-space: nowrap;
    }

    .empty-log {
      font-size: 12px;
      color: #6d6d72;
      padding: 4px 0;
    }

    .toast {
      position: fixed;
      bottom: calc(1.2rem + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      background: #1c1c1e;
      color: #f2f2f7;
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 10px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 99;
    }

    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <div class="top">
    <h1>👁 Lens Tracker</h1>
    <p class="subtitle">Tap "New Lens" to start tracking. Tap again when you swap to a fresh lens.</p>
  </div>

  <div class="cards">
    <div class="eye-card">
      <div class="eye-header">
        <div class="eye-dot" id="dot-left"></div>
        <span class="eye-label">Left Eye</span>
      </div>
      <div class="timer-display" id="timer-left">00d 00h 00m</div>
      <div class="timer-sub" id="sub-left">Not started</div>
      <button class="btn-new-lens" onclick="newLens('left')">↺ New Lens</button>
    </div>

    <div class="eye-card">
      <div class="eye-header">
        <div class="eye-dot" id="dot-right"></div>
        <span class="eye-label">Right Eye</span>
      </div>
      <div class="timer-display" id="timer-right">00d 00h 00m</div>
      <div class="timer-sub" id="sub-right">Not started</div>
      <button class="btn-new-lens" onclick="newLens('right')">↺ New Lens</button>
    </div>
  </div>

  <div class="reset-both-wrap">
    <button class="btn-both" onclick="newLensBoth()">↺ New Lens — Both Eyes</button>
  </div>

  <hr class="divider" />

  <div class="log-section">
    <div class="log-header">
      <div class="log-meta">
        <span class="log-title">Data log</span>
        <span class="log-count" id="log-count">0 events</span>
      </div>
      <button class="btn-export" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
    <div id="log-entries">
      <p class="empty-log">No events yet. Tap "New Lens" to begin logging.</p>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STATE_KEY = 'lens_tracker_state';
    const LOG_KEY = 'lens_tracker_log';
    let state = { left: null, right: null };
    let log = [];

    function loadData() {
      try {
        const s = localStorage.getItem(STATE_KEY);
        if (s) state = JSON.parse(s);
        const l = localStorage.getItem(LOG_KEY);
        if (l) log = JSON.parse(l);
      } catch(e) {}
    }

    function saveState() { localStorage.setItem(STATE_KEY, JSON.stringify(state)); }
    function saveLog() { localStorage.setItem(LOG_KEY, JSON.stringify(log)); }

    function formatDuration(ms) {
      const totalSec = Math.floor(ms / 1000);
      const d = Math.floor(totalSec / 86400);
      const h = Math.floor((totalSec % 86400) / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      return (d > 0 ? d + 'd ' : '00d ') + String(h).padStart(2,'0') + 'h ' + String(m).padStart(2,'0') + 'm';
    }

    function fmtDate(ts) {
      const d = new Date(ts);
      return d.toLocaleDateString([], {month:'short', day:'numeric'}) + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }

    function fmtDateFull(ts) {
      const d = new Date(ts);
      return d.toLocaleDateString() + ' ' + d.toLocaleTimeString();
    }

    function logEvent(eye, type, ts, duration_ms) {
      const entry = { eye, type, timestamp: ts };
      if (duration_ms != null) {
        entry.duration_ms = duration_ms;
        entry.duration_readable = formatDuration(duration_ms);
      }
      log.push(entry);
      saveLog();
      updateLogCount();
      renderLog();
    }

    function updateLogCount() {
      document.getElementById('log-count').textContent = log.length === 1 ? '1 event' : log.length + ' events';
    }

    function renderLog() {
      const el = document.getElementById('log-entries');
      if (log.length === 0) {
        el.innerHTML = '<p class="empty-log">No events yet. Tap "New Lens" to begin logging.</p>';
        return;
      }
      el.innerHTML = [...log].reverse().map(e => {
        const dur = e.duration_readable ? ' · ' + e.duration_readable : '';
        const typeLabel = e.type === 'start' ? 'Started' : 'New Lens';
        return `<div class="log-entry">
          <span class="log-eye">${e.eye === 'left' ? 'L' : 'R'}</span>
          <span class="log-label">${typeLabel}${dur}</span>
          <span class="log-time">${fmtDate(e.timestamp)}</span>
        </div>`;
      }).join('');
    }

    // Single button: logs current session (if any) and immediately starts a new one
    function newLens(eye) {
      const ts = Date.now();
      if (state[eye]) {
        logEvent(eye, 'new_lens', ts, ts - state[eye]);
      } else {
        logEvent(eye, 'start', ts, null);
      }
      state[eye] = ts;
      saveState();
      updateUI(eye);
      showToast((eye === 'left' ? 'Left' : 'Right') + ' lens started');
    }

    // Logs current sessions and immediately restarts both
    function newLensBoth() {
      const ts = Date.now();
      ['left', 'right'].forEach(eye => {
        if (state[eye]) {
          logEvent(eye, 'new_lens', ts, ts - state[eye]);
        } else {
          logEvent(eye, 'start', ts, null);
        }
        state[eye] = ts;
      });
      saveState();
      updateUI('left');
      updateUI('right');
      showToast('Both lenses started fresh');
    }

    function updateUI(eye) {
      const dot = document.getElementById('dot-' + eye);
      const sub = document.getElementById('sub-' + eye);
      const timer = document.getElementById('timer-' + eye);
      if (state[eye]) {
        dot.classList.add('active');
        sub.textContent = 'Since ' + fmtDateFull(state[eye]);
      } else {
        dot.classList.remove('active');
        sub.textContent = 'Not started';
        timer.textContent = '00d 00h 00m';
      }
    }

    function tick() {
      ['left','right'].forEach(eye => {
        if (!state[eye]) return;
        document.getElementById('timer-' + eye).textContent = formatDuration(Date.now() - state[eye]);
      });
    }

    function exportCSV() {
      if (log.length === 0) { showToast('No data to export yet'); return; }
      const rows = [['eye','event_type','timestamp','duration_ms','duration_readable']];
      log.forEach(e => rows.push([e.eye, e.type, new Date(e.timestamp).toISOString(), e.duration_ms || '', e.duration_readable || '']));
      const csv = rows.map(r => r.join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'lens_log_' + new Date().toISOString().slice(0,10) + '.csv';
      a.click();
      URL.revokeObjectURL(url);
      showToast('CSV exported');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    loadData();
    updateUI('left');
    updateUI('right');
    updateLogCount();
    renderLog();
    tick();
    setInterval(tick, 30000);
  </script>
</body>
</html>
